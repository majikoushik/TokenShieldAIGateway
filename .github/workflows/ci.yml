name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: Build & Test ──────────────────────────────────────────────────
  build-backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gateway-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore NuGet packages
        run: dotnet restore TokenShield.slnx

      - name: Build (Release)
        run: dotnet build TokenShield.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test TokenShield.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: apps/gateway-api/tests/**/test-results.trx

  # ── Frontend: Build & Lint ─────────────────────────────────────────────────
  build-frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
